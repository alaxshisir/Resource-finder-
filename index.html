<!DOCTYPE html>
<html class="dark" lang="bn">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ultimate Resource Finder - Real-time Search</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&family=Inter:wght@400;500;600&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131313; color: #e5e2e1; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(19, 19, 19, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="selection:bg-green-500 selection:text-black">

    <header class="fixed top-0 w-full z-50 glass-header border-b border-white/5 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-[#39ff14] flex items-center justify-center text-black font-black">U</div>
            <h1 class="text-lg font-black text-[#39ff14] tracking-tighter">UR Finder</h1>
        </div>
        <span class="material-symbols-outlined text-[#39ff14]">menu</span>
    </header>

    <main class="pt-24 pb-32 px-6 max-w-5xl mx-auto min-h-screen">
        
        <section id="home" class="page-section active text-center">
            <h2 class="text-4xl font-black mb-4">Find Any <span class="text-[#39ff14]">Book.</span></h2>
            <p class="text-gray-400 mb-8 font-bengali">যেকোনো বইয়ের নাম লিখুন এবং ফ্রি ডাউনলোড লিঙ্ক পান।</p>
            
            <div class="relative max-w-lg mx-auto mb-10">
                <input id="searchInput" type="text" placeholder="Search (e.g. Physics, History)..." 
                       class="w-full bg-zinc-900 border-none rounded-2xl py-4 pl-6 pr-20 focus:ring-2 focus:ring-[#39ff14]/50">
                <button onclick="searchBooks()" class="absolute right-2 top-2 bottom-2 bg-[#39ff14] text-black px-4 rounded-xl font-bold">Search</button>
            </div>
        </section>

        <section id="search-results" class="page-section">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showPage('home')" class="p-2 bg-zinc-800 rounded-full"><span class="material-symbols-outlined">arrow_back</span></button>
                <h3 class="text-xl font-bold">Search Results</h3>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full glass-header border-t border-white/5 flex justify-around py-4">
        <button onclick="showPage('home')" class="flex flex-col items-center text-[#39ff14]">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] uppercase font-bold">Home</span>
        </button>
        <button onclick="showPage('search-results')" class="flex flex-col items-center text-gray-500">
            <span class="material-symbols-outlined">manage_search</span>
            <span class="text-[10px] uppercase font-bold">Search</span>
        </button>
    </nav>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            if (!query) return alert("Please type something!");

            const grid = document.getElementById('resultsGrid');
            showPage('search-results');
            grid.innerHTML = '<div class="col-span-full text-center py-10">বই খোঁজা হচ্ছে... একটু অপেক্ষা করুন।</div>';

            try {
                // Open Library API কল করা হচ্ছে
                const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=10`);
                const data = await response.json();
                
                grid.innerHTML = '';

                if (data.docs.length === 0) {
                    grid.innerHTML = '<p class="text-center col-span-full">দুঃখিত, কোনো বই পাওয়া যায়নি।</p>';
                    return;
                }

                data.docs.forEach(book => {
                    const title = book.title;
                    const author = book.author_name ? book.author_name[0] : 'Unknown';
                    // সরাসরি পিডিএফ ডাউনলোড লিঙ্কের জন্য গুগল ড্রাইভ বা আর্কাইভ ফিল্টার ট্রিক
                    const downloadQuery = `${title} ${author} filetype:pdf`;
                    const downloadLink = `https://www.google.com/search?q=${encodeURIComponent(downloadQuery)}`;
                    
                    grid.innerHTML += `
                        <div class="bg-zinc-900/50 p-5 rounded-2xl border border-white/5 flex flex-col justify-between">
                            <div>
                                <h4 class="text-[#39ff14] font-bold text-lg leading-tight mb-1">${title}</h4>
                                <p class="text-sm text-gray-400 mb-4 italic">Author: ${author}</p>
                            </div>
                            <div class="flex items-center justify-between mt-auto">
                                <span class="text-[10px] bg-white/5 px-2 py-1 rounded text-gray-500 uppercase font-bold">PDF Ready</span>
                                <a href="${downloadLink}" target="_blank" class="bg-[#39ff14] text-black px-4 py-2 rounded-lg text-xs font-black uppercase hover:scale-95 transition-transform">
                                    Get Link
                                </a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                grid.innerHTML = '<p class="text-red-500 text-center col-span-full">সার্ভারে সমস্যা হয়েছে। আবার চেষ্টা করুন।</p>';
            }
        }
    </script>
</body>
</html>
