<!DOCTYPE html>
<html class="dark" lang="bn">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ultimate Resource Finder - PDF & Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <style>
        body { background-color: #080808; color: #e5e2e1; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .active-tab { background-color: #39ff14 !important; color: black !important; }
        .card { background: #121212; border: 1px solid #1a1a1a; transition: 0.3s; }
        .card:hover { border-color: #39ff14; }
        .loader { border-top-color: #39ff14; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Video Overlay */
        #videoOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto min-h-screen">
        <header class="text-center my-8">
            <h1 class="text-3xl font-black tracking-tighter"><span class="text-[#39ff14]">UR</span> Finder</h1>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em]">Academic & Food Yard Hub</p>
        </header>

        <div class="flex bg-zinc-900/50 p-1.5 rounded-2xl mb-8 gap-1">
            <button id="pdfTab" onclick="switchMode('pdf')" class="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active-tab transition-all">
                <span class="material-symbols-outlined text-lg">description</span> বই পিডিএফ
            </button>
            <button id="videoTab" onclick="switchMode('video')" class="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-gray-500 transition-all">
                <span class="material-symbols-outlined text-lg">smart_display</span> ভিডিও ক্লাস
            </button>
        </div>

        <div class="relative mb-10">
            <input id="searchInput" type="text" placeholder="বইয়ের নাম বা টপিক লিখুন..." 
                   class="w-full bg-[#121212] border-2 border-zinc-800 rounded-2xl py-5 pl-14 pr-32 focus:border-[#39ff14] focus:ring-0 text-lg">
            <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-gray-500">search</span>
            <button onclick="handleSearch()" class="absolute right-3 top-2.5 bottom-2.5 bg-[#39ff14] text-black px-6 rounded-xl font-black text-sm uppercase">খুঁজুন</button>
        </div>

        <div id="status" class="text-center py-20">
            <div id="spinner" class="loader w-10 h-10 border-4 border-white/5 rounded-full mx-auto mb-4 hidden"></div>
            <div id="placeholder">
                <span class="material-symbols-outlined text-6xl text-zinc-800 mb-4">auto_awesome</span>
                <p class="text-zinc-600 font-bold font-bengali">আপনার পছন্দের টপিকটি সার্চ করুন</p>
            </div>
        </div>

        <div id="resultsGrid" class="grid gap-4 mb-32"></div>
    </div>

    <div id="videoOverlay">
        <div class="w-full max-w-3xl">
            <button onclick="closeVideo()" class="text-white mb-4 flex items-center gap-2 font-bold"><span class="material-symbols-outlined">close</span> Close Player</button>
            <div class="relative pt-[56.25%] bg-black rounded-2xl overflow-hidden">
                <iframe id="ytPlayer" class="absolute inset-0 w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        let mode = 'pdf';

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('pdfTab').className = `flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${mode === 'pdf' ? 'active-tab' : 'text-gray-500'}`;
            document.getElementById('videoTab').className = `flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${mode === 'video' ? 'active-tab' : 'text-gray-500'}`;
            document.getElementById('searchInput').placeholder = mode === 'pdf' ? "বইয়ের নাম বা টপিক লিখুন..." : "ভিডিও ক্লাস বা লেকচার খুঁজুন...";
            document.getElementById('resultsGrid').innerHTML = "";
            document.getElementById('status').classList.remove('hidden');
        }

        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const grid = document.getElementById('resultsGrid');
            const spinner = document.getElementById('spinner');
            const placeholder = document.getElementById('placeholder');

            grid.innerHTML = "";
            placeholder.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                if (mode === 'pdf') {
                    const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=8`);
                    const data = await res.json();
                    renderItems(data.docs.map(b => ({
                        title: b.title,
                        sub: b.author_name ? b.author_name[0] : 'Free Library',
                        link: `https://www.google.com/search?q=${encodeURIComponent(b.title + " filetype:pdf")}`,
                        label: 'Download PDF',
                        icon: 'book',
                        isVideo: false
                    })));
                } else {
                    // ডামি ডাটা দিয়ে ইউটিউব স্টাইল রেজাল্ট (এখানে আপনি YouTube API ব্যবহার করতে পারেন)
                    const videoDummies = [
                        { title: `${query} | Full Concept Class`, sub: 'Physics Wallah', id: 'O6v_N9S88-M' },
                        { title: `${query} | One Shot Lecture`, sub: '10 Minute School', id: '3vK9o7uCiwI' },
                        { title: `${query} | Exam Preparation`, sub: 'Khan Academy', id: 'fA2_3n8mGZ0' }
                    ];
                    renderItems(videoDummies.map(v => ({
                        title: v.title,
                        sub: v.sub,
                        id: v.id,
                        label: 'Play Class',
                        icon: 'play_circle',
                        isVideo: true
                    })));
                }
            } catch (err) { alert("Error!"); }
            spinner.classList.add('hidden');
        }

        function renderItems(items) {
            const grid = document.getElementById('resultsGrid');
            document.getElementById('status').classList.add('hidden');

            items.forEach(item => {
                const action = item.isVideo ? `onclick="playVideo('${item.id}')"` : `href="${item.link}" target="_blank"`;
                grid.innerHTML += `
                    <div class="card p-5 rounded-2xl flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="material-symbols-outlined text-[#39ff14] text-3xl">${item.icon}</span>
                            <div>
                                <h4 class="font-bold text-sm">${item.title}</h4>
                                <p class="text-[10px] text-zinc-500 uppercase font-bold">${item.sub}</p>
                            </div>
                        </div>
                        <${item.isVideo ? 'button' : 'a'} ${action} class="bg-[#39ff14] text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase cursor-pointer">
                            ${item.label}
                        </${item.isVideo ? 'button' : 'a'}>
                    </div>
                `;
            });
        }

        function playVideo(id) {
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('videoOverlay').style.display = 'flex';
        }

        function closeVideo() {
            document.getElementById('ytPlayer').src = "";
            document.getElementById('videoOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
