<!DOCTYPE html>
<html class="dark" lang="bn">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>UR Finder - Real Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <style>
        body { background-color: #080808; color: #e5e2e1; font-family: 'Hind Siliguri', sans-serif; }
        .active-tab { background-color: #39ff14 !important; color: black !important; box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        .search-btn { background-color: #39ff14; color: black; transition: 0.3s; font-weight: 900; }
        iframe { width: 100%; height: 550px; border-radius: 1.5rem; border: 1px solid #333; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-[#39ff14] tracking-tighter">UR Finder</h1>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Academic & Entertainment Hub</p>
        </header>

        <div class="flex bg-zinc-900/50 p-1.5 rounded-2xl mb-8 gap-2">
            <button id="pdfTab" onclick="switchMode('pdf')" class="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active-tab transition-all">
                <span class="material-symbols-outlined">description</span> বই পিডিএফ
            </button>
            <button id="videoTab" onclick="switchMode('video')" class="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-gray-500 transition-all">
                <span class="material-symbols-outlined">smart_display</span> ভিডিও ক্লাস
            </button>
        </div>

        <div class="relative bg-zinc-900 rounded-2xl mb-10 border-2 border-zinc-800 focus-within:border-[#39ff14] transition-all overflow-hidden">
            <input id="searchInput" type="text" placeholder="বই বা টপিক লিখে সার্চ দিন..." 
                   class="w-full bg-transparent py-5 pl-14 pr-32 focus:ring-0 text-lg outline-none">
            <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-gray-500">search</span>
            <button onclick="performSearch()" class="search-btn absolute right-2 top-2 bottom-2 px-6 rounded-xl text-sm uppercase">খুঁজুন</button>
        </div>

        <div id="resultsContainer">
            <div id="welcome" class="text-center py-20 opacity-20">
                <span class="material-symbols-outlined text-7xl">explore</span>
                <p class="font-bold mt-2">আপনার সার্চের জন্য প্রস্তুত!</p>
            </div>

            <div id="videoView" class="hidden">
                <p class="text-[10px] text-[#39ff14] font-black uppercase mb-3 tracking-widest flex items-center gap-2">
                    <span class="animate-pulse w-2 h-2 bg-[#39ff14] rounded-full"></span> সরাসরি ইউটিউব থেকে লোড হচ্ছে...
                </p>
                <div class="shadow-2xl shadow-[#39ff14]/5">
                    <iframe id="ytIframe" src="" allowfullscreen></iframe>
                </div>
            </div>

            <div id="pdfView" class="grid gap-4 hidden"></div>
        </div>
    </div>

    <script>
        let currentMode = 'pdf';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('pdfTab').className = `flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${mode === 'pdf' ? 'active-tab' : 'text-gray-500'}`;
            document.getElementById('videoTab').className = `flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${mode === 'video' ? 'active-tab' : 'text-gray-500'}`;
            document.getElementById('searchInput').placeholder = mode === 'pdf' ? "বইয়ের নাম লিখে সার্চ দিন..." : "ভিডিও টপিক লিখে সার্চ দিন...";
            
            // Clear current view
            document.getElementById('pdfView').classList.add('hidden');
            document.getElementById('videoView').classList.add('hidden');
            document.getElementById('welcome').classList.remove('hidden');
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            document.getElementById('welcome').classList.add('hidden');

            if (currentMode === 'video') {
                document.getElementById('pdfView').classList.add('hidden');
                document.getElementById('videoView').classList.remove('hidden');
                
                // Real-time Search Hack (Without API Key)
                // এটি ইউটিউবের সার্চ রেজাল্টকে সরাসরি একটি প্লেবল লিস্ট হিসেবে আপনার আইফ্রেমের ভেতরে নিয়ে আসবে
                const searchUrl = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query + " class bangla")}`;
                document.getElementById('ytIframe').src = searchUrl;

            } else {
                document.getElementById('videoView').classList.add('hidden');
                document.getElementById('pdfView').classList.remove('hidden');
                document.getElementById('pdfView').innerHTML = "<p class='text-center py-10 opacity-50 animate-pulse'>বই খোঁজা হচ্ছে...</p>";
                await fetchBooks(query);
            }
        }

        async function fetchBooks(q) {
            try {
                const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=10`);
                const data = await res.json();
                const container = document.getElementById('pdfView');
                container.innerHTML = "";

                if(data.docs.length === 0) {
                    container.innerHTML = "<p class='text-center py-10'>দুঃখিত, কোনো বই পাওয়া যায়নি!</p>";
                    return;
                }

                data.docs.forEach(book => {
                    const searchLink = `https://www.google.com/search?q=${encodeURIComponent(book.title + " filetype:pdf")}`;
                    container.innerHTML += `
                        <div class="bg-zinc-900/80 p-5 rounded-2xl border border-white/5 flex items-center justify-between group hover:border-[#39ff14] transition-all">
                            <div class="truncate pr-4">
                                <h4 class="font-bold text-sm truncate group-hover:text-[#39ff14] transition-colors">${book.title}</h4>
                                <p class="text-[10px] text-zinc-500 font-bold mt-1">${book.author_name ? book.author_name[0] : 'Free Academy'}</p>
                            </div>
                            <a href="${searchLink}" target="_blank" class="bg-[#39ff14]/10 text-[#39ff14] border border-[#39ff14]/30 px-5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-[#39ff14] hover:text-black transition-all shadow-lg shadow-[#39ff14]/5">Download</a>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('pdfView').innerHTML = "Error loading data.";
            }
        }
    </script>
</body>
</html>
