<!DOCTYPE html>
<html class="dark" lang="bn">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>UR Finder - 100% Working Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <style>
        body { background-color: #080808; color: #e5e2e1; font-family: 'Hind Siliguri', sans-serif; }
        .active-tab { background-color: #39ff14 !important; color: black !important; }
        .card { background: #121212; border: 1px solid #1a1a1a; transition: 0.3s; }
        .card:hover { border-color: #39ff14; transform: translateY(-2px); }
        .search-btn { background-color: #39ff14; color: black; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-xl mx-auto min-h-screen">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black text-[#39ff14]">UR Finder</h1>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.3em]">Resource Center</p>
        </header>

        <div class="flex bg-zinc-900/50 p-1.5 rounded-2xl mb-8 gap-2">
            <button id="pdfTab" onclick="switchMode('pdf')" class="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active-tab transition-all">
                <span class="material-symbols-outlined">description</span> বই পিডিএফ
            </button>
            <button id="videoTab" onclick="switchMode('video')" class="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-gray-500 transition-all">
                <span class="material-symbols-outlined">smart_display</span> ভিডিও ক্লাস
            </button>
        </div>

        <div class="relative bg-zinc-900 rounded-2xl mb-12 border-2 border-zinc-800 focus-within:border-[#39ff14] overflow-hidden">
            <input id="searchInput" type="text" placeholder="বইয়ের নাম লিখে সার্চ দিন..." 
                   class="w-full bg-transparent py-5 pl-14 pr-32 focus:ring-0 text-lg outline-none">
            <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-gray-500">search</span>
            <button onclick="handleSearch()" class="search-btn absolute right-2 top-2 bottom-2 px-6 rounded-xl text-sm uppercase">খুঁজুন</button>
        </div>

        <div id="resultsGrid" class="grid gap-4">
            <div id="welcome" class="text-center py-20 opacity-30">
                <span class="material-symbols-outlined text-7xl">search_check</span>
                <p class="font-bold mt-2">সার্চ দিয়ে ম্যাজিক দেখুন!</p>
            </div>
        </div>
    </div>

    <script>
        let mode = 'pdf';

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('pdfTab').className = `flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${mode === 'pdf' ? 'active-tab' : 'text-gray-500'}`;
            document.getElementById('videoTab').className = `flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${mode === 'video' ? 'active-tab' : 'text-gray-500'}`;
            document.getElementById('searchInput').placeholder = mode === 'pdf' ? "বইয়ের নাম লিখে সার্চ দিন..." : "ভিডিও টপিক লিখে সার্চ দিন...";
            document.getElementById('resultsGrid').innerHTML = "";
        }

        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = "<p class='text-center py-10 animate-pulse'>অপেক্ষা করুন...</p>";

            if (mode === 'pdf') {
                // আসল বইয়ের ডাটা fetching
                try {
                    const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=10`);
                    const data = await res.json();
                    grid.innerHTML = "";
                    data.docs.forEach(b => {
                        const link = `https://www.google.com/search?q=${encodeURIComponent(b.title + " filetype:pdf")}`;
                        grid.innerHTML += createCard(b.title, b.author_name ? b.author_name[0] : 'Free Academy', link, 'description', 'Download PDF');
                    });
                } catch (e) { grid.innerHTML = "সমস্যা হয়েছে!"; }
            } else {
                // ভিডিওর জন্য স্মার্ট সার্চ বাটন (এটি সরাসরি সঠিক রেজাল্ট দিবে)
                grid.innerHTML = "";
                const videoLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(query + " class bangla")}`;
                
                grid.innerHTML += `
                    <div class="card p-6 rounded-3xl text-center border-2 border-[#39ff14]/20">
                        <span class="material-symbols-outlined text-5xl text-[#39ff14] mb-4">play_circle</span>
                        <h3 class="text-xl font-bold mb-2">"${query}" এর ভিডিও ক্লাস</h3>
                        <p class="text-xs text-zinc-500 mb-6 font-bengali tracking-wide">সরাসরি ইউটিউব থেকে আপনার টপিকের সেরা ভিডিওগুলো দেখুন।</p>
                        <a href="${videoLink}" target="_blank" class="block w-full bg-[#39ff14] text-black py-4 rounded-2xl font-black uppercase text-sm">Open Video Results</a>
                    </div>
                `;
            }
        }

        function createCard(title, sub, link, icon, btnText) {
            return `
                <div class="card p-5 rounded-2xl flex items-center justify-between group">
                    <div class="truncate pr-4">
                        <h4 class="font-bold text-sm truncate group-hover:text-[#39ff14]">${title}</h4>
                        <p class="text-[10px] text-zinc-500 uppercase font-bold mt-1">${sub}</p>
                    </div>
                    <a href="${link}" target="_blank" class="bg-[#39ff14]/10 text-[#39ff14] border border-[#39ff14]/30 px-5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-[#39ff14] hover:text-black transition-all">
                        ${btnText}
                    </a>
                </div>`;
        }
    </script>
</body>
</html>
